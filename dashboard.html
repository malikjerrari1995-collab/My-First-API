<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f13; --surface: #1a1a22; --surface2: #22222e; --border: #2e2e3e;
    --accent: #7c6af7; --text: #f0f0f8; --text2: #9090a8; --text3: #5a5a72;
    --success: #6af7c0; --warning: #f7c86a; --danger: #f76a8a;
    --radius: 16px; --radius-sm: 10px;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* AUTH SCREEN */
  #auth-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: radial-gradient(ellipse at 50% 0%, rgba(124,106,247,0.15) 0%, transparent 60%);
  }
  .auth-box {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 40px; width: 100%; max-width: 420px;
  }
  .auth-logo { font-family: 'DM Serif Display', serif; font-size: 28px; margin-bottom: 8px; }
  .auth-logo span { color: var(--accent); }
  .auth-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
  .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; font-size: 14px; font-weight: 500; cursor: pointer; background: transparent; border: none; color: var(--text2); transition: all 0.2s; }
  .auth-tab.active { background: var(--accent); color: white; }
  .auth-form { display: flex; flex-direction: column; gap: 14px; }
  .auth-form input { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 12px 16px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; width: 100%; }
  .auth-form input:focus { border-color: var(--accent); }
  .auth-form input::placeholder { color: var(--text3); }
  .auth-btn { background: var(--accent); color: white; border: none; padding: 13px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .auth-btn:hover { background: #6a58e8; transform: translateY(-1px); }
  .auth-error { color: var(--danger); font-size: 13px; text-align: center; display: none; }

  /* MAIN APP */
  #app-screen { display: none; }
  header { padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); background: rgba(15,15,19,0.9); backdrop-filter: blur(12px); position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'DM Serif Display', serif; font-size: 20px; }
  .logo span { color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .user-name { font-size: 13px; color: var(--text2); }
  .month-selector input { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; }
  .btn { padding: 8px 16px; border-radius: var(--radius-sm); border: none; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #6a58e8; }
  .btn-ghost { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); }
  .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  main { max-width: 1200px; margin: 0 auto; padding: 32px 40px; }
  #alerts-banner { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
  .alert-item { background: rgba(247,106,138,0.1); border: 1px solid rgba(247,106,138,0.3); border-radius: var(--radius-sm); padding: 12px 16px; font-size: 13px; color: var(--danger); }
  .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 22px; transition: border-color 0.2s; }
  .card:hover { border-color: var(--accent); }
  .card-label { font-size: 11px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
  .card-value { font-family: 'DM Serif Display', serif; font-size: 28px; letter-spacing: -1px; line-height: 1; margin-bottom: 4px; }
  .card-sub { font-size: 11px; color: var(--text3); }
  .positive { color: var(--success); } .negative { color: var(--danger); } .neutral { color: var(--accent); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
  .full-col { margin-bottom: 18px; }
  .section-title { font-family: 'DM Serif Display', serif; font-size: 17px; margin-bottom: 14px; }
  .budget-item { margin-bottom: 16px; }
  .budget-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .budget-name { font-size: 13px; font-weight: 500; text-transform: capitalize; }
  .budget-amounts { font-size: 12px; color: var(--text2); }
  .progress-track { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 3px; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }
  .progress-ok { background: var(--success); } .progress-warn { background: var(--warning); } .progress-over { background: var(--danger); }
  .budget-status { font-size: 11px; margin-top: 4px; }
  .expense-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid var(--border); }
  .expense-item:last-child { border-bottom: none; }
  .expense-left { display: flex; align-items: center; gap: 10px; }
  .expense-icon { width: 34px; height: 34px; border-radius: 9px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 15px; }
  .expense-name { font-size: 13px; font-weight: 500; }
  .expense-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .expense-amount { font-size: 14px; font-weight: 600; color: var(--danger); }
  .badge { display: inline-block; font-size: 10px; padding: 2px 6px; border-radius: 20px; font-weight: 500; margin-left: 5px; }
  .badge-recurring { background: rgba(124,106,247,0.15); color: var(--accent); }
  .savings-item { margin-bottom: 18px; }
  .savings-header { display: flex; justify-content: space-between; margin-bottom: 7px; }
  .savings-name { font-size: 14px; font-weight: 500; }
  .savings-pct { font-size: 13px; color: var(--accent); font-weight: 600; }
  .savings-status { font-size: 12px; color: var(--text2); margin-top: 4px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 500; color: var(--text2); }
  input[type=text], input[type=number], select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 13px; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
  input[type=text]:focus, input[type=number]:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--text3); }
  select option { background: var(--surface2); }
  .checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text2); grid-column: 1 / -1; }
  .checkbox-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); }
  .form-actions { grid-column: 1 / -1; display: flex; gap: 10px; margin-top: 4px; }
  .category-row { display: flex; align-items: center; justify-content: space-between; padding: 9px 0; border-bottom: 1px solid var(--border); }
  .category-row:last-child { border-bottom: none; }
  .category-name { font-size: 13px; text-transform: capitalize; }
  .category-amount { font-size: 13px; font-weight: 600; }
  #toast { position: fixed; bottom: 28px; right: 28px; background: var(--success); color: #0f0f13; padding: 11px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(10px); transition: all 0.3s; z-index: 999; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }
  .empty { color: var(--text3); font-size: 13px; padding: 14px 0; text-align: center; }
  .loading { color: var(--text3); font-size: 13px; padding: 10px 0; }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">finance<span>.</span></div>
    <div class="auth-sub">Your personal finance dashboard</div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Sign In</button>
      <button class="auth-tab" onclick="showTab('register')">Create Account</button>
    </div>
    <div class="auth-form" id="login-form">
      <input type="text" id="login-email" placeholder="Email address">
      <input type="password" id="login-password" placeholder="Password">
      <div class="auth-error" id="login-error">Invalid email or password</div>
      <button class="auth-btn" onclick="login()">Sign In</button>
    </div>
    <div class="auth-form" id="register-form" style="display:none">
      <input type="text" id="reg-name" placeholder="Your name">
      <input type="text" id="reg-email" placeholder="Email address">
      <input type="password" id="reg-password" placeholder="Password">
      <div class="auth-error" id="reg-error">Something went wrong</div>
      <button class="auth-btn" onclick="register()">Create Account</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app-screen">
  <header>
    <div class="logo">finance<span>.</span></div>
    <div class="header-right">
      <span class="user-name" id="user-name"></span>
      <div class="month-selector">
        <input type="month" id="month-picker">
      </div>
      <button class="btn btn-primary" onclick="loadAll()">Load</button>
      <button class="btn btn-ghost" onclick="exportCSV()">Export CSV</button>
      <button class="btn btn-danger" onclick="logout()">Logout</button>
    </div>
  </header>
  <main>
    <div id="alerts-banner"></div>
    <div class="summary-grid">
      <div class="card"><div class="card-label">Income</div><div class="card-value positive" id="card-income">—</div><div class="card-sub">this month</div></div>
      <div class="card"><div class="card-label">Expenses</div><div class="card-value negative" id="card-expenses">—</div><div class="card-sub">this month</div></div>
      <div class="card"><div class="card-label">Balance</div><div class="card-value" id="card-balance">—</div><div class="card-sub" id="card-balance-status">—</div></div>
      <div class="card"><div class="card-label">Recurring</div><div class="card-value neutral" id="card-recurring">—</div><div class="card-sub">fixed monthly costs</div></div>
    </div>
    <div class="two-col">
      <div class="card"><div class="section-title">Budgets</div><div id="budgets-list"><div class="loading">Loading...</div></div></div>
      <div class="card"><div class="section-title">Savings Goals</div><div id="savings-list"><div class="loading">Loading...</div></div></div>
    </div>
    <div class="card full-col">
      <div class="section-title">Add Expense</div>
      <div class="form-grid">
        <div class="form-group"><label>Amount (£)</label><input type="number" id="exp-amount" placeholder="0.00" step="0.01"></div>
        <div class="form-group"><label>Category</label>
          <select id="exp-category">
            <option value="food">Food</option><option value="transport">Transport</option>
            <option value="entertainment">Entertainment</option><option value="fitness">Fitness</option>
            <option value="rent">Rent</option><option value="shopping">Shopping</option>
            <option value="utilities">Utilities</option><option value="other">Other</option>
          </select>
        </div>
        <div class="form-group full"><label>Description</label><input type="text" id="exp-desc" placeholder="What was this for?"></div>
        <div class="checkbox-row"><input type="checkbox" id="exp-recurring"><label for="exp-recurring">Recurring monthly expense</label></div>
        <div class="form-actions"><button class="btn btn-primary" onclick="addExpense()">Add Expense</button></div>
      </div>
    </div>
    <div class="two-col">
      <div class="card"><div class="section-title">Recent Expenses</div><div id="expenses-list"><div class="loading">Loading...</div></div></div>
      <div class="card"><div class="section-title">Spending by Category</div><div id="category-list"><div class="loading">Loading...</div></div></div>
    </div>
  </main>
</div>

<div id="toast"></div>

<script>
const API = window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost'
  ? 'http://127.0.0.1:8000'
  : 'https://my-first-api-production-0383.up.railway.app';

const ICONS = { food:'🍔', transport:'🚗', entertainment:'🎬', fitness:'💪', rent:'🏠', shopping:'🛍️', utilities:'💡', other:'📦' };

let token = localStorage.getItem('token');
let userName = localStorage.getItem('userName');

function getHeaders() {
  return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
}

function getMonth() { return document.getElementById('month-picker').value; }
function fmt(n) { return '£' + parseFloat(n).toFixed(2); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function showTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t, i) => t.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1)));
  document.getElementById('login-form').style.display = tab === 'login' ? 'flex' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? 'flex' : 'none';
}

async function login() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  if (!email || !password) return;
  try {
    const res = await fetch(`${API}/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `username=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`
    });
    const data = await res.json();
    if (!res.ok) { document.getElementById('login-error').style.display = 'block'; return; }
    document.getElementById('login-error').style.display = 'none';
    token = data.access_token;
    userName = data.name || email;
    localStorage.setItem('token', token);
    localStorage.setItem('userName', userName);
    showApp();
  } catch(e) { document.getElementById('login-error').style.display = 'block'; }
}

async function register() {
  const name = document.getElementById('reg-name').value;
  const email = document.getElementById('reg-email').value;
  const password = document.getElementById('reg-password').value;
  if (!email || !password) return;
  try {
    const res = await fetch(`${API}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password, name })
    });
    const data = await res.json();
    if (!res.ok) { document.getElementById('reg-error').textContent = data.detail || 'Something went wrong'; document.getElementById('reg-error').style.display = 'block'; return; }
    document.getElementById('reg-error').style.display = 'none';
    token = data.token;
    userName = data.name || email;
    localStorage.setItem('token', token);
    localStorage.setItem('userName', userName);
    showApp();
  } catch(e) { document.getElementById('reg-error').style.display = 'block'; }
}

function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('userName');
  token = null;
  userName = null;
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app-screen').style.display = 'none';
}

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('user-name').textContent = `Hi, ${userName}!`;
  const now = new Date();
  document.getElementById('month-picker').value = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  loadAll();
}

async function loadAll() {
  const month = getMonth();
  if (!month) return;
  loadSummary(month);
  loadBudgets(month);
  loadSavings(month);
  loadExpenses(month);
}

async function loadSummary(month) {
  try {
    const res = await fetch(`${API}/summary/${month}`, { headers: getHeaders() });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    document.getElementById('card-income').textContent = fmt(data.total_income);
    document.getElementById('card-expenses').textContent = fmt(data.total_expenses);
    const bal = document.getElementById('card-balance');
    bal.textContent = fmt(data.balance);
    bal.className = 'card-value ' + (data.balance >= 0 ? 'positive' : 'negative');
    document.getElementById('card-balance-status').textContent = data.balance_status;
    document.getElementById('card-recurring').textContent = fmt(data.recurring_expenses || 0);
    const banner = document.getElementById('alerts-banner'); banner.innerHTML = '';
    if (data.alerts && data.alerts.length > 0) { data.alerts.forEach(a => { banner.innerHTML += `<div class="alert-item">⚠️ ${a}</div>`; }); }
    const catList = document.getElementById('category-list');
    if (data.spending_by_category && data.spending_by_category.length > 0) {
      catList.innerHTML = data.spending_by_category.map(c => `<div class="category-row"><span class="category-name">${ICONS[c.category]||'📦'} ${c.category}</span><span class="category-amount">${fmt(c.total)}</span></div>`).join('');
    } else { catList.innerHTML = '<div class="empty">No expenses this month</div>'; }
  } catch(e) { console.error(e); }
}

async function loadBudgets(month) {
  try {
    const res = await fetch(`${API}/budgets?month=${month}`, { headers: getHeaders() });
    const data = await res.json();
    const list = document.getElementById('budgets-list');
    if (!data.budgets || data.budgets.length === 0) { list.innerHTML = '<div class="empty">No budgets set for this month</div>'; return; }
    list.innerHTML = data.budgets.map(b => {
      const pct = Math.min(b.percentage, 100);
      const cls = b.percentage >= 100 ? 'progress-over' : b.percentage >= 80 ? 'progress-warn' : 'progress-ok';
      const sc = b.percentage >= 100 ? 'var(--danger)' : b.percentage >= 80 ? 'var(--warning)' : 'var(--success)';
      return `<div class="budget-item"><div class="budget-header"><span class="budget-name">${ICONS[b.category]||'📦'} ${b.category}</span><span class="budget-amounts">${fmt(b.spent)} / ${fmt(b.limit)}</span></div><div class="progress-track"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div><div class="budget-status" style="color:${sc}">${b.status} — ${b.percentage}%</div></div>`;
    }).join('');
  } catch(e) { document.getElementById('budgets-list').innerHTML = '<div class="empty">Could not load budgets</div>'; }
}

async function loadSavings(month) {
  try {
    const res = await fetch(`${API}/savings/${month}`, { headers: getHeaders() });
    const data = await res.json();
    const list = document.getElementById('savings-list');
    if (!data.goals || data.goals.length === 0) { list.innerHTML = '<div class="empty">No savings goals for this month</div>'; return; }
    list.innerHTML = data.goals.map(g => {
      const pct = Math.min(g.percentage, 100);
      const cls = g.percentage >= 100 ? 'progress-ok' : g.percentage >= 50 ? 'progress-warn' : 'progress-over';
      return `<div class="savings-item"><div class="savings-header"><span class="savings-name">🎯 ${g.name}</span><span class="savings-pct">${g.percentage}%</span></div><div class="progress-track"><div class="progress-fill ${cls}" style="width:${pct}%"></div></div><div class="savings-status">${fmt(g.saved_so_far)} saved of ${fmt(g.target)} target — ${g.status}</div></div>`;
    }).join('');
  } catch(e) { document.getElementById('savings-list').innerHTML = '<div class="empty">Could not load savings</div>'; }
}

async function loadExpenses(month) {
  try {
    const res = await fetch(`${API}/expenses?month=${month}`, { headers: getHeaders() });
    const data = await res.json();
    const list = document.getElementById('expenses-list');
    if (!data.expenses || data.expenses.length === 0) { list.innerHTML = '<div class="empty">No expenses this month</div>'; return; }
    list.innerHTML = data.expenses.slice(0,10).map(e => `<div class="expense-item"><div class="expense-left"><div class="expense-icon">${ICONS[e.category]||'📦'}</div><div><div class="expense-name">${e.description||e.category}${e.recurring?'<span class="badge badge-recurring">recurring</span>':''}</div><div class="expense-meta">${e.category} · ${e.date}</div></div></div><div class="expense-amount">${fmt(e.amount)}</div></div>`).join('');
  } catch(e) { document.getElementById('expenses-list').innerHTML = '<div class="empty">Could not load expenses</div>'; }
}

async function addExpense() {
  const amount = parseFloat(document.getElementById('exp-amount').value);
  const category = document.getElementById('exp-category').value;
  const description = document.getElementById('exp-desc').value;
  const recurring = document.getElementById('exp-recurring').checked;
  if (!amount || amount <= 0) { alert('Please enter a valid amount'); return; }
  try {
    const res = await fetch(`${API}/expenses`, { method: 'POST', headers: getHeaders(), body: JSON.stringify({amount, category, description, recurring}) });
    const data = await res.json();
    showToast('✅ Expense added!');
    document.getElementById('exp-amount').value = '';
    document.getElementById('exp-desc').value = '';
    document.getElementById('exp-recurring').checked = false;
    loadAll();
  } catch(e) { alert('Could not add expense.'); }
}

function exportCSV() {
  const month = getMonth();
  if (!month) return;
  window.open(`${API}/export/${month}?token=${token}`, '_blank');
}

// Check if already logged in
if (token) {
  showApp();
} else {
  document.getElementById('auth-screen').style.display = 'flex';
}
</script>
</body>
</html>
